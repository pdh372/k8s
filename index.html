<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/styles.css">
<title>CKA Prompt Generator</title>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">CKA</div>
    <div>
      <h1>Prompt Generator</h1>
      <div class="subtitle">$ Chọn topic → copy prompt → paste vào AI bất kỳ</div>
    </div>
  </div>

  <div id="topic-list"></div>

  <!-- Output -->
  <div class="output-panel" id="output-panel">
    <div class="out-header">
      <span class="out-title">PROMPT SẴN SÀNG ĐỂ COPY</span>
    </div>

    <!-- Quick notes -->
    <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted2);margin-bottom:5px;">THÊM NOTE CÁ NHÂN (tuỳ chọn)</div>
    <div class="hint-row" id="hint-chips"></div>
    <div class="note-row">
      <textarea class="note-input" id="note-input" placeholder="VD: hay nhầm Role vs ClusterRole, quên flag --data-dir khi restore etcd..."></textarea>
      <button class="note-btn" onclick="applyNote()">+ Thêm</button>
    </div>

    <button class="review-btn" id="review-btn" onclick="toggleReview()" style="display:none">� Ôn lí thuyết topic này</button>
    <div class="prompt-box" id="prompt-box"></div>
    <button class="copy-btn" id="copy-btn" onclick="copyPrompt()">📋 Copy prompt</button>
  </div>
</div>

<!-- Data: one file per section -->
<script src="js/data/s1.js"></script>
<script src="js/data/s2.js"></script>
<script src="js/data/s3.js"></script>
<script src="js/data/s4.js"></script>
<script src="js/data/s5.js"></script>
<script src="js/data/s6.js"></script>
<script src="js/data/s7.js"></script>
<script src="js/data/s8.js"></script>
<script src="js/data/s9.js"></script>
<!-- App logic -->
<script src="js/app.js"></script>
</body>
</html>
